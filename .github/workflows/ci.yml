name: ENGRAM OS CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" || pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Install optional dependencies
        run: |
          pip install faiss-cpu 2>/dev/null || echo "faiss-cpu optional - skipping"
        continue-on-error: true

      - name: Run test suite
        run: |
          python -m pytest engram/tests/ \
            -v \
            --tb=short \
            --timeout=60 \
            -x \
            --ignore=engram/tests/test_ollama.py \
            --ignore=engram/tests/test_benchmarks.py
        env:
          PYTHONPATH: .

      - name: Report test results
        if: always()
        run: |
          python -m pytest engram/tests/ \
            --tb=no -q \
            --ignore=engram/tests/test_ollama.py \
            --ignore=engram/tests/test_benchmarks.py \
            2>/dev/null | tail -5 || true

  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: |
          pip install ruff black

      - name: Run ruff
        run: ruff check engram/ --ignore E501,E402
        continue-on-error: true

      - name: Check black formatting
        run: black --check engram/ --line-length 100
        continue-on-error: true

  import-check:
    name: Import Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyyaml numpy
          pip install faiss-cpu 2>/dev/null || true
          pip install -e . 2>/dev/null || true

      - name: Validate core imports
        run: |
          python -c "
          import sys
          modules = [
              'engram.core.agent',
              'engram.core.vector_db',
              'engram.core.router',
              'engram.core.scorer',
              'engram.core.writeback',
              'engram.core.session',
              'engram.orchestration.board',
              'engram.orchestration.signal',
              'engram.orchestration.deadlock',
          ]
          failed = []
          for m in modules:
              try:
                  __import__(m)
                  print(f'  OK  {m}')
              except ImportError as e:
                  print(f'  FAIL {m}: {e}')
                  failed.append(m)
          if failed:
              print(f'Failed imports: {failed}')
              sys.exit(1)
          print('All core imports OK')
          "
        env:
          PYTHONPATH: .
